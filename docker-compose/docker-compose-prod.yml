services:

  med-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile-prod
    image:  vburcovschi/medexpert:backend-prod.${APP_VERSION:?Set APP_VERSION (Docker/.env or --env-file appversion.env)}
    container_name: medexpert-backend-prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CACHE_TYPE=none
      - SPRING_DATA_REDIS_HOST=med-redis
      - SPRING_DATA_REDIS_PORT=6379
      - APP_CORS_ALLOWED_ORIGIN=https://medexpert.caa.md
      - SPRINGDOC_API_DOCS_ENABLED=false
      - SPRINGDOC_SWAGGER_UI_ENABLED=false
      - APP_SWAGGER_ENABLED=false
#    depends_on:
#      - med-redis
    env_file:
      - ../config/db_secret.env
      - ../config/ssl_secret.env
    ports:
      - "8443:8443"
      - "8082:8082"
    restart: unless-stopped
    networks:
      - medexpert-net-prod
    volumes:
      - ../config/application-prod.properties:/app/application.properties:ro
      - ../SSL/backend-keystore.p12:/etc/ssl/backend-keystore.p12:ro

#  med-redis:
#    image: redis:7-alpine
#    container_name: medexpert-redis-prod
#    restart: unless-stopped
#    ports:
#      - "6379:6379"
#    networks:
#      - medexpert-net-prod

  med-prometheus:
    image: prom/prometheus:latest
    container_name: medexpert-prometheus-prod
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - med-backend
      - med-node-exporter
    networks:
      - medexpert-net-prod

  med-node-exporter:
    image: prom/node-exporter:latest
    container_name: medexpert-node-exporter-prod
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    ports:
      - "9100:9100"
    volumes:
      - "/:/host:ro,rshared"
    networks:
      - medexpert-net-prod

  med-grafana:
    image: grafana/grafana:latest
    container_name: medexpert-grafana-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - med-prometheus
    networks:
      - medexpert-net-prod


  med-frontend:
    build:
      context: ../frontend/app
      dockerfile: Dockerfile-prod
      args:
        NODE_ENV: production
        VITE_APP_VERSION: ${APP_VERSION:?Set APP_VERSION (Docker/.env or --env-file appversion.env)}
    image: vburcovschi/medexpert:frontend-prod.${APP_VERSION:?Set APP_VERSION (Docker/.env or --env-file appversion.env)}
    container_name: medexpert-frontend-prod
    ports:
      - "80:8080"
      - "443:8443"
    environment:
        API_URL: "/api/v1"
        APP_VERSION: "${APP_VERSION:?Set APP_VERSION (Docker/shared/appversion.env or --env-file appversion.env)}"
    extra_hosts:
      - "backend-medexpert.caa.md:host-gateway"
    depends_on:
      -  med-backend
    restart: unless-stopped
    networks:
      - medexpert-net-prod
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./SSL:/etc/nginx/ssl:ro
networks:
  medexpert-net-prod:
    driver: bridge
