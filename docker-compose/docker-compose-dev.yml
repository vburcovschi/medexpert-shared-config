services:

  med-backend:
    build:
      context: ../../../../../backend
      dockerfile: Dockerfile-dev
    image:  vburcovschi/medexpert:backend-dev.${APP_VERSION:?Set APP_VERSION (Docker/.env or --env-file appversion.env)}
    container_name: medexpert-backend-dev
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_DEBUG=true
      - APP_CORS_ALLOWED_ORIGIN=https://medexpert.caa.md,http://localhost:5173
      - SPRINGDOC_API_DOCS_ENABLED=true
      - SPRINGDOC_SWAGGER_UI_ENABLED=true
      - APP_SWAGGER_ENABLED=true
    env_file:
      - ../../../../../Docker/config/db_secret.env
      - ../../../../../Docker/config/ssl_secret.env
    ports:
      - "8443:8443"
      - "8081:8081"
      - "5005:5005"
    restart: unless-stopped
    networks:
      - medexpert-net-dev
    volumes:
      - "D:/Dropbox/JAVA Source/medexpert/backend/src/main/resources/application-dev.properties:/app/application.properties:ro"
      - "D:/Dropbox/JAVA Source/medexpert/Docker/SSL/backend-keystore.p12:/etc/ssl/backend-keystore.p12:ro"


  med-frontend:
    build:
      context: ../../../../../frontend/app
      dockerfile: Dockerfile-dev
      args:
        NODE_ENV: development
        VITE_APP_VERSION: ${APP_VERSION:?Set APP_VERSION (Docker/.env or --env-file appversion.env)}
    image: vburcovschi/medexpert:frontend-dev.${APP_VERSION:?Set APP_VERSION (Docker/.env or --env-file appversion.env)}
    container_name: medexpert-frontend-dev
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      API_URL: "/api/v1"
    depends_on:
      -  med-backend
    restart: unless-stopped
    networks:
      - medexpert-net-dev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - "D:/Dropbox/JAVA Source/medexpert/Docker/SSL/:/etc/nginx/ssl:ro"
networks:
  medexpert-net-dev:
    driver: bridge
